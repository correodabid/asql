name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Unformatted files:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.7.2

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -cover ./...

  race:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Race detector
        run: go test -race ./...

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify module dependencies
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX-JSON)
        run: syft dir:. -o spdx-json > sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json

  release-artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, race, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/asqld-linux-amd64 ./cmd/asqld
          GOOS=linux GOARCH=amd64 go build -o dist/asqlctl-linux-amd64 ./cmd/asqlctl
          GOOS=darwin GOARCH=arm64 go build -o dist/asqld-darwin-arm64 ./cmd/asqld
          GOOS=darwin GOARCH=arm64 go build -o dist/asqlctl-darwin-arm64 ./cmd/asqlctl

      - name: Generate checksums
        run: |
          cd dist
          sha256sum asqld-linux-amd64 asqlctl-linux-amd64 asqld-darwin-arm64 asqlctl-darwin-arm64 > checksums.txt

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate release SBOM
        run: syft dir:. -o spdx-json > dist/sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign checksums with keyless Sigstore
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: dist/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
