syntax = "proto3";

package asql.v1;

option go_package = "asql/api/proto/asql/v1;asqlv1";

service RaftService {
  rpc RequestVote(RaftRequestVoteRequest) returns (RaftRequestVoteResponse);
  rpc AppendEntries(RaftAppendEntriesRequest) returns (RaftAppendEntriesResponse);
}

message RaftRequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RaftRequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message RaftEntry {
  uint64 index = 1;
  uint64 term = 2;
  string tx_id = 3;
  string type = 4;
  bytes payload = 5;
}

message RaftAppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated RaftEntry entries = 5;
  uint64 leader_commit = 6;
}

message RaftAppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 last_index = 3;
  uint64 conflict_term = 4;
  uint64 conflict_index = 5;
}
